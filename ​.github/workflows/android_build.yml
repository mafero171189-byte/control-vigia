name: APK_VIGIA
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: npm install -g @bubblewrap/cli
      - name: Build
        run: |
          bubblewrap build --skipSigning || echo "Configurando..."
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ControlVigia-APK
          path: ./*.apk
