name: APK_VIGIA
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compilar
        run: |
          npm install -g @bubblewrap/cli
          bubblewrap build --skipSigning || echo "Sigue intentando..."

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Instalador-Vigia
          path: ./*.apk
